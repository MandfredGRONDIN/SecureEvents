
services:
  # Application PHP Symfony (conteneur de développement)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        uid: ${UID:-1000}
    container_name: secureevents_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0
    depends_on:
      database:
        condition: service_healthy
    user: "${UID:-1000}:1000"

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5432:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
