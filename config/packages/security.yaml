security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    # Argon2id explicite (exigence CDC : hachage cryptographique robuste)
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: auto
            # En PHP 7.3+, "auto" choisit Argon2id par défaut ; on peut forcer :
            # algorithm: argon2id

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        # used to reload user from session & other features (e.g. switch_user)

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            # Redirige les utilisateurs non connectés vers la page événements au lieu du login
            entry_point: App\Security\RedirectToEventEntryPoint

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                csrf_token_id: authenticate
                default_target_path: app_event_index

            # Protection force brute (CDC) : blocage après X tentatives échouées
            login_throttling:
                max_attempts: 5
                interval: '5 minutes'

            logout:
                path: /user/logout
                target: /

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # L'ordre compte : la première règle qui correspond est appliquée
    access_control:
        # Pages publiques (non connecté)
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/user/login, roles: PUBLIC_ACCESS }
        - { path: ^/user/logout, roles: PUBLIC_ACCESS }
        # Création et édition d'événements : réservées aux utilisateurs connectés
        - { path: ^/event/new, roles: ROLE_USER }
        - { path: ^/event/.+/edit, roles: ROLE_USER }
        # API REST : lecture du catalogue d'événements (partenaires, applications mobiles)
        - { path: ^/api/events, roles: PUBLIC_ACCESS }
        # Liste et détail des événements : public
        - { path: ^/event, roles: PUBLIC_ACCESS }
        # Réservations : réservé aux utilisateurs connectés
        - { path: ^/reservation, roles: ROLE_USER }
        # Profil utilisateur (modifier ses infos) : réservé aux connectés
        - { path: ^/profile, roles: ROLE_USER }
        # Zone d'administration /admin : 403 pour non-admin (exigence CDC)
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Liste des utilisateurs (back-office) : réservé aux administrateurs
        - { path: ^/user, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
